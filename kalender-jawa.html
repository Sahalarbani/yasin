<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0F766E">
  <title>Kalender Jawa</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    :root { --bg:#F2F2F7;--card:#FFF;--text:#111827;--muted:#6B7280;--border:rgba(15,23,42,.1);--accent:#0F766E;--accent-soft:rgba(15,118,110,.12);--danger:#DC2626;--danger-soft:rgba(220,38,38,.1);--leave:#7C3AED;--leave-soft:rgba(124,58,237,.11) }
    body.dark-mode { --bg:#000;--card:#1C1C1E;--text:#F9FAFB;--muted:#A1A1AA;--border:rgba(255,255,255,.14);--accent-soft:rgba(45,212,191,.16);--danger-soft:rgba(248,113,113,.17);--leave-soft:rgba(167,139,250,.17) }
    * { box-sizing:border-box } body { margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;padding:calc(68px + env(safe-area-inset-top)) 16px calc(34px + env(safe-area-inset-bottom)) }
    .navbar { position:fixed;inset:0 0 auto;height:calc(54px + env(safe-area-inset-top));padding:env(safe-area-inset-top) 14px 0;display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.78);border-bottom:.5px solid var(--border);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);z-index:10 }
    body.dark-mode .navbar { background:rgba(28,28,30,.78) }.navbar-title { position:absolute;left:50%;transform:translateX(-50%);font-size:1.05rem;font-weight:750 }.back-btn,.today-btn,.nav-btn { border:0;background:transparent;color:var(--accent);cursor:pointer;font-weight:700;font-size:.95rem }.back-btn { display:flex;align-items:center;gap:3px;padding:8px 0 }.today-btn { padding:8px 0 } main { max-width:760px;margin:0 auto }
    .hero { padding:20px;border-radius:24px;color:#FFF;margin-bottom:16px;background:radial-gradient(circle at 100% 0,rgba(255,255,255,.2),transparent 38%),linear-gradient(135deg,#115E59,#0F766E 62%,#14B8A6);box-shadow:0 14px 30px rgba(15,118,110,.2) }.hero-kicker { font-size:.72rem;font-weight:800;letter-spacing:.1em;opacity:.76;text-transform:uppercase }.hero-date { font-size:1.2rem;font-weight:800;margin:9px 0 4px }.hero-weton { font-size:1.85rem;font-weight:850;letter-spacing:-.04em }.hero-detail { margin-top:7px;font-size:.84rem;opacity:.86 }
    .calendar-card,.event-card { background:var(--card);border:.5px solid var(--border);border-radius:22px;padding:14px;box-shadow:0 2px 8px rgba(0,0,0,.04) }.calendar-header { display:grid;grid-template-columns:42px 1fr 42px;gap:8px;align-items:center;margin-bottom:15px }.nav-btn { height:42px;border-radius:13px;background:var(--accent-soft);font-size:1.08rem }.month-picker { width:100%;border:1px solid var(--border);border-radius:13px;padding:10px 8px;background:var(--bg);color:var(--text);font-size:.94rem;font-weight:750;text-align:center }
    .grid { display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:5px }.weekday { padding:3px 0 7px;color:var(--muted);text-align:center;font-size:.67rem;font-weight:800;text-transform:uppercase }.weekday.sunday { color:var(--danger) }.day { position:relative;min-height:62px;padding:7px 2px 5px;border-radius:11px;background:var(--bg);border:1px solid transparent;text-align:center }.day.empty { visibility:hidden }.day.today { border-color:var(--accent);box-shadow:inset 0 0 0 1px var(--accent) }.day.sunday .date { color:var(--danger) }.day.holiday { background:var(--danger-soft) }.day.leave { background:var(--leave-soft) }.date { font-size:1rem;font-weight:850 }.pasaran { color:var(--accent);font-size:.65rem;font-weight:750;margin-top:5px }.neptu { color:var(--muted);font-size:.59rem;margin-top:2px }.dot { position:absolute;top:5px;right:5px;width:5px;height:5px;border-radius:50%;background:var(--danger) }.dot.leave { background:var(--leave) }
    .legend { display:flex;flex-wrap:wrap;gap:11px;padding:13px 1px 1px;color:var(--muted);font-size:.72rem;font-weight:650 }.legend span { display:flex;align-items:center;gap:5px }.legend i { width:8px;height:8px;border-radius:50%;background:var(--danger) }.legend i.leave { background:var(--leave) }.event-card { margin-top:16px }.event-title { display:flex;align-items:center;gap:8px;margin:0 0 10px;font-size:.97rem }.event-list { list-style:none;margin:0;padding:0 }.event-item { display:grid;grid-template-columns:54px 1fr;gap:9px;padding:10px 0;border-bottom:.5px solid var(--border) }.event-item:last-child { border-bottom:0;padding-bottom:1px }.event-day { color:var(--accent);font-size:.76rem;font-weight:800 }.event-name { font-size:.82rem;font-weight:700;line-height:1.35 }.badge { display:inline-block;margin-top:4px;border-radius:999px;padding:3px 7px;font-size:.62rem;font-weight:800 }.badge.holiday { color:var(--danger);background:var(--danger-soft) }.badge.leave { color:var(--leave);background:var(--leave-soft) }.empty-event { color:var(--muted);font-size:.82rem;line-height:1.5 }.source { margin:14px 2px 0;color:var(--muted);font-size:.7rem;line-height:1.45 }.source a { color:var(--accent) }
  </style>
</head>
<body class="dark-mode">
  <header class="navbar"><button class="back-btn" onclick="goBack()"><i class="bi bi-chevron-left"></i> Home</button><div class="navbar-title">Kalender Jawa</div><button class="today-btn" onclick="goToday()">Hari ini</button></header>
  <main>
    <section class="hero"><div class="hero-kicker">Weton Hari Ini</div><div class="hero-date" id="todayDate"></div><div class="hero-weton" id="todayWeton"></div><div class="hero-detail" id="todayDetail"></div></section>
    <section class="calendar-card">
      <div class="calendar-header"><button class="nav-btn" onclick="changeMonth(-1)" aria-label="Bulan sebelumnya"><i class="bi bi-chevron-left"></i></button><input class="month-picker" type="month" id="monthPicker" onchange="renderCalendar()"><button class="nav-btn" onclick="changeMonth(1)" aria-label="Bulan berikutnya"><i class="bi bi-chevron-right"></i></button></div>
      <div class="grid"><div class="weekday sunday">Min</div><div class="weekday">Sen</div><div class="weekday">Sel</div><div class="weekday">Rab</div><div class="weekday">Kam</div><div class="weekday">Jum</div><div class="weekday">Sab</div></div><div class="grid" id="calendarGrid"></div>
      <div class="legend"><span><i></i> Libur nasional</span><span><i class="leave"></i> Cuti bersama</span></div>
    </section>
    <section class="event-card"><h2 class="event-title"><i class="bi bi-calendar2-check-fill" style="color:var(--accent)"></i> Libur & Cuti Bersama</h2><ul class="event-list" id="eventList"></ul></section>
    <p class="source">Data libur dan cuti bersama 2026 mengacu pada <a href="https://www.setneg.go.id/baca/index/inilah_skb_3_menteri_libur_nasional_dan_cuti_bersama_2026">SKB 3 Menteri Tahun 2026</a>. Kalender tetap dapat dipakai offline.</p>
  </main>
  <script>
    const PASARAN=['Legi','Pahing','Pon','Wage','Kliwon'],DAY_NEPTU=[5,4,3,7,8,6,9],PASARAN_NEPTU={Legi:5,Pahing:9,Pon:7,Wage:4,Kliwon:8},EPOCH_UTC=Date.UTC(1970,0,1);let activeDate=new Date();
    const EVENTS_2026=[
      ['2026-01-01','Tahun Baru 2026 Masehi','holiday'],['2026-01-16','Isra Mikraj Nabi Muhammad saw.','holiday'],['2026-02-16','Cuti bersama Tahun Baru Imlek 2577 Kongzili','leave'],['2026-02-17','Tahun Baru Imlek 2577 Kongzili','holiday'],['2026-03-18','Cuti bersama Hari Suci Nyepi','leave'],['2026-03-19','Hari Suci Nyepi (Tahun Baru Saka 1948)','holiday'],['2026-03-20','Cuti bersama Idulfitri 1447 H','leave'],['2026-03-21','Hari Raya Idulfitri 1447 H','holiday'],['2026-03-22','Hari Raya Idulfitri 1447 H','holiday'],['2026-03-23','Cuti bersama Idulfitri 1447 H','leave'],['2026-03-24','Cuti bersama Idulfitri 1447 H','leave'],['2026-04-03','Wafat Yesus Kristus','holiday'],['2026-04-05','Kebangkitan Yesus Kristus (Paskah)','holiday'],['2026-05-01','Hari Buruh Internasional','holiday'],['2026-05-14','Kenaikan Yesus Kristus','holiday'],['2026-05-15','Cuti bersama Kenaikan Yesus Kristus','leave'],['2026-05-27','Hari Raya Iduladha 1447 H','holiday'],['2026-05-28','Cuti bersama Iduladha 1447 H','leave'],['2026-05-31','Hari Raya Waisak 2570 BE','holiday'],['2026-06-01','Hari Lahir Pancasila','holiday'],['2026-06-16','1 Muharam Tahun Baru Islam 1448 H','holiday'],['2026-08-17','Proklamasi Kemerdekaan','holiday'],['2026-08-25','Maulid Nabi Muhammad saw.','holiday'],['2026-12-24','Cuti bersama Kelahiran Yesus Kristus','leave'],['2026-12-25','Kelahiran Yesus Kristus','holiday']
    ].map(([date,name,type])=>({date,name,type}));
    function dateKey(date){return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`}
    function getPasaran(date){const days=Math.floor((Date.UTC(date.getFullYear(),date.getMonth(),date.getDate())-EPOCH_UTC)/86400000);return PASARAN[((days+3)%5+5)%5]}
    function getWeton(date){const pasaran=getPasaran(date);return {pasaran,neptu:DAY_NEPTU[date.getDay()]+PASARAN_NEPTU[pasaran]}}
    function formatDate(date,options){return new Intl.DateTimeFormat('id-ID',options).format(date)}
    function renderToday(){const today=new Date(),weton=getWeton(today);document.getElementById('todayDate').textContent=formatDate(today,{weekday:'long',day:'numeric',month:'long',year:'numeric'});document.getElementById('todayWeton').textContent=`${formatDate(today,{weekday:'long'})} ${weton.pasaran}`;document.getElementById('todayDetail').textContent=`Neptu ${weton.neptu} - Siklus weton 35 hari`}
    function renderCalendar(){const picker=document.getElementById('monthPicker');if(picker.value){const [year,month]=picker.value.split('-').map(Number);activeDate=new Date(year,month-1,1)}const year=activeDate.getFullYear(),month=activeDate.getMonth();picker.value=`${year}-${String(month+1).padStart(2,'0')}`;const firstDay=new Date(year,month,1).getDay(),lastDate=new Date(year,month+1,0).getDate(),todayKey=dateKey(new Date()),monthEvents=EVENTS_2026.filter(event=>event.date.startsWith(`${year}-${String(month+1).padStart(2,'0')}`)),eventsByDate=monthEvents.reduce((groups,event)=>((groups[event.date]||=[]).push(event),groups),{});let cells='';for(let i=0;i<firstDay;i++)cells+='<div class="day empty"></div>';for(let day=1;day<=lastDate;day++){const date=new Date(year,month,day),key=dateKey(date),events=eventsByDate[key]||[],weton=getWeton(date),hasHoliday=events.some(event=>event.type==='holiday'),hasLeave=events.some(event=>event.type==='leave'),classes=['day',key===todayKey?'today':'',date.getDay()===0?'sunday':'',hasHoliday?'holiday':'',hasLeave?'leave':''].filter(Boolean).join(' '),dot=hasHoliday?'<i class="dot"></i>':hasLeave?'<i class="dot leave"></i>':'';cells+=`<div class="${classes}">${dot}<div class="date">${day}</div><div class="pasaran">${weton.pasaran}</div><div class="neptu">N ${weton.neptu}</div></div>`}document.getElementById('calendarGrid').innerHTML=cells;renderEvents(monthEvents,year)}
    function renderEvents(events,year){const list=document.getElementById('eventList');if(!events.length){list.innerHTML=`<li class="empty-event">${year===2026?'Tidak ada libur nasional atau cuti bersama pada bulan ini.':'Data resmi libur nasional dan cuti bersama yang tersimpan offline tersedia untuk tahun 2026.'}</li>`;return}list.innerHTML=events.map(event=>{const date=new Date(`${event.date}T00:00:00`),label=event.type==='holiday'?'Libur nasional':'Cuti bersama';return `<li class="event-item"><div class="event-day">${formatDate(date,{day:'numeric',month:'short'})}</div><div><div class="event-name">${event.name}</div><span class="badge ${event.type}">${label}</span></div></li>`}).join('')}
    function changeMonth(offset){activeDate=new Date(activeDate.getFullYear(),activeDate.getMonth()+offset,1);document.getElementById('monthPicker').value='';renderCalendar()}function goToday(){activeDate=new Date();document.getElementById('monthPicker').value='';renderCalendar()}function goBack(){window.location.href='index.html#homePage'}function applyTheme(){if(localStorage.getItem('isDarkMode')==='false')document.body.classList.remove('dark-mode');const color=localStorage.getItem('appAccentColor');if(color)document.documentElement.style.setProperty('--accent',color)}
    if('serviceWorker' in navigator)navigator.serviceWorker.register('service-worker.js');applyTheme();renderToday();renderCalendar();
  </script>
</body>
</html>
