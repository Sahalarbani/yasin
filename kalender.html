<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Kalender Hijriah & Masehi</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #F2F2F7; --bg-secondary: #FFFFFF; --text-main: #000000;
      --text-muted: #8E8E93; --accent: #0A84FF; --danger: #FF3B30; --success: #34C759;
      --border: rgba(0,0,0,0.1); --soft-fill: rgba(118,118,128,0.1);
    }
    body.night {
      --bg-primary: #000000; --bg-secondary: #1C1C1E; --text-main: #FFFFFF;
      --text-muted: rgba(235,235,245,0.62); --border: rgba(255,255,255,0.15); --soft-fill: rgba(118,118,128,0.2);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; padding: 16px 16px 40px; background: var(--bg-primary); color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      transition: background-color 0.3s ease, color 0.3s ease;
    }
    .calendar-hero {
      min-height: 176px; margin-bottom: 14px; padding: 20px; display: flex; flex-direction: column; justify-content: space-between;
      border-radius: 26px; overflow: hidden; position: relative; color: #FFF;
      background: radial-gradient(circle at 95% 0%, rgba(255,255,255,0.22), transparent 33%), linear-gradient(135deg, #075E54, #087F67 58%, #10A37F);
      box-shadow: 0 14px 32px rgba(0,0,0,0.2);
    }
    .calendar-hero::after { content: "۞"; position: absolute; right: 12px; bottom: -43px; color: rgba(255,255,255,0.14); font-size: 8rem; line-height: 1; }
    .hero-copy, .hero-status { position: relative; z-index: 1; }
    .hero-kicker { display: flex; align-items: center; gap: 6px; color: rgba(255,255,255,0.76); font-size: 0.68rem; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; }
    .today-masehi { margin-top: 10px; color: #FFF; font-size: 1.4rem; font-weight: 800; letter-spacing: -0.04em; line-height: 1.2; }
    .today-hijri { margin-top: 6px; color: rgba(255,255,255,0.84); font-size: 0.92rem; font-weight: 700; }
    .hero-status { display: inline-flex; align-items: center; align-self: flex-start; gap: 7px; padding: 8px 11px; border-radius: 999px; background: rgba(255,255,255,0.17); color: rgba(255,255,255,0.9); font-size: 0.73rem; font-weight: 800; backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); }
    .controls-wrapper, .calendar-shell, .holiday-panel {
      background: var(--bg-secondary); border: 0.5px solid var(--border); border-radius: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    .controls-wrapper { padding: 14px; margin-bottom: 12px; }
    .section-kicker { margin: 0 2px 11px; color: var(--text-muted); font-size: 0.68rem; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; }
    .header { display: grid; grid-template-columns: 40px minmax(0,1fr) 40px; gap: 8px; align-items: center; margin-bottom: 11px; }
    .month-year-picker {
      width: 100%; min-width: 0; padding: 9px 6px; border: 1px solid var(--border); border-radius: 12px;
      appearance: none; outline: none; background: var(--bg-primary); color: var(--text-main); text-align: center; font-size: 0.94rem; font-weight: 750;
    }
    .nav-btn {
      width: 40px; height: 40px; display: grid; place-items: center; border: 0; border-radius: 12px;
      background: var(--soft-fill); color: var(--accent); cursor: pointer; font-size: 1.05rem;
    }
    .nav-btn:active, .adj-btn:active { opacity: 0.65; }
    .adj-container { display: flex; align-items: center; justify-content: space-between; padding: 9px 10px; border-radius: 12px; background: var(--bg-primary); }
    .adj-title { color: var(--text-muted); font-size: 0.74rem; font-weight: 700; }
    .adj-controls { display: flex; align-items: center; gap: 7px; }
    .adj-btn { padding: 0 3px; border: 0; background: transparent; color: var(--accent); cursor: pointer; font-size: 1.12rem; }
    .adj-value { width: 28px; color: var(--text-main); text-align: center; font-size: 0.85rem; font-weight: 800; }
    .calendar-shell { padding: 13px 11px 11px; }
    .grid { display: grid; grid-template-columns: repeat(7, minmax(0,1fr)); gap: 5px; }
    .day-name { padding: 1px 0 6px; color: var(--text-muted); text-align: center; font-size: 0.65rem; font-weight: 800; text-transform: uppercase; }
    .day-name.sunday { color: var(--danger); }
    .day-name.friday { color: var(--success); }
    .cell {
      min-height: 58px; padding: 8px 2px 6px; display: flex; flex-direction: column; align-items: center; justify-content: center;
      border: 1px solid transparent; border-radius: 11px; position: relative; background: var(--bg-primary);
    }
    .cell.empty { visibility: hidden; }
    .cell.today { border-color: var(--accent); box-shadow: inset 0 0 0 1px var(--accent); }
    .cell.today .gregorian { color: var(--accent); }
    .cell.holiday { background: rgba(255,59,48,0.1); }
    .cell.holiday .gregorian { color: var(--danger); }
    .cell.friday .gregorian { color: var(--success); }
    .holiday-dot { width: 5px; height: 5px; border-radius: 50%; position: absolute; top: 5px; right: 5px; background: var(--danger); }
    .gregorian { margin-bottom: 6px; color: var(--text-main); font-size: 1rem; font-weight: 800; line-height: 1; }
    .hijri { color: var(--accent); font-family: 'Amiri', serif; font-size: 1rem; font-weight: 700; line-height: 1; }
    .calendar-legend { display: flex; flex-wrap: wrap; gap: 11px; padding: 12px 1px 1px; color: var(--text-muted); font-size: 0.68rem; font-weight: 700; }
    .calendar-legend span { display: flex; align-items: center; gap: 5px; }
    .calendar-legend i { width: 7px; height: 7px; border-radius: 50%; background: var(--danger); }
    .calendar-legend i.friday { background: var(--success); }
    .calendar-legend i.today { background: var(--accent); }
    .holiday-panel { padding: 15px; margin-top: 12px; }
    .holiday-title { display: flex; align-items: center; gap: 7px; margin-bottom: 11px; color: var(--text-main); font-size: 0.88rem; font-weight: 800; }
    .holiday-list { margin: 0; padding: 0; list-style: none; }
    .holiday-item { display: flex; flex-direction: column; padding: 10px 0; border-bottom: 0.5px solid var(--border); }
    .holiday-item:last-child { padding-bottom: 0; border-bottom: 0; }
    .h-date { display: flex; align-items: center; margin-bottom: 3px; font-size: 0.76rem; font-weight: 800; }
    .h-name { padding-left: 24px; color: var(--text-muted); font-size: 0.8rem; line-height: 1.4; }
  </style>
</head>
<body class="night">

  <section class="calendar-hero">
    <div class="hero-copy">
      <div class="hero-kicker"><i class="bi bi-calendar2-week-fill"></i> Kalender Harian</div>
      <div class="today-masehi" id="todayCE">Memuat...</div>
      <div class="today-hijri" id="todayHijr">Memuat...</div>
    </div>
    <div class="hero-status"><i class="bi bi-moon-stars-fill"></i> Masehi & Hijriah</div>
  </section>

  <section class="controls-wrapper">
    <div class="section-kicker">Pilih Bulan</div>
    <div class="header">
      <button class="nav-btn" onclick="changeMonth(-1)" aria-label="Bulan sebelumnya"><i class="bi bi-chevron-left"></i></button>
      <input type="month" id="monthPicker" class="month-year-picker" onchange="renderCalendar()">
      <button class="nav-btn" onclick="changeMonth(1)" aria-label="Bulan berikutnya"><i class="bi bi-chevron-right"></i></button>
    </div>
    
    <div class="adj-container">
      <div class="adj-title"><i class="bi bi-moon-stars-fill me-1"></i> Koreksi NU/Hilal</div>
      <div class="adj-controls">
        <button class="adj-btn" onclick="changeAdj(-1)" aria-label="Kurangi koreksi hijriah"><i class="bi bi-dash-circle-fill"></i></button>
        <div class="adj-value" id="adjDisplay">0</div>
        <button class="adj-btn" onclick="changeAdj(1)" aria-label="Tambah koreksi hijriah"><i class="bi bi-plus-circle-fill"></i></button>
      </div>
    </div>
  </section>

  <section class="calendar-shell">
    <div class="grid" id="dayNames">
      <div class="day-name sunday">Ahad</div><div class="day-name">Sen</div><div class="day-name">Sel</div>
      <div class="day-name">Rab</div><div class="day-name">Kam</div><div class="day-name friday">Jum</div><div class="day-name">Sab</div>
    </div>
    <div class="grid" id="calendarGrid"></div>
    <div class="calendar-legend"><span><i class="today"></i> Hari ini</span><span><i></i> Ahad / libur</span><span><i class="friday"></i> Jumat</span></div>
  </section>

  <section class="holiday-panel" id="holidayPanel" style="display: none;">
    <div class="holiday-title"><i class="bi bi-calendar-event-fill" style="color: var(--accent);"></i> Hari Penting & Libur</div>
    <ul class="holiday-list" id="holidayList"></ul>
  </section>

  <script>
    let currentDate = new Date();
    let hijriAdjustment = parseInt(localStorage.getItem('hijriAdj')) || 0;
    let eventsList = [];
    let apiHariLiburCache = null; 
    
    // Mesin Acara Islam Otomatis
    const islamicEvents = {
      "1-1": "Tahun Baru Islam (1 Muharram)", "1-10": "Puasa Asyura (10 Muharram)",
      "7-27": "Isra' Mi'raj (27 Rajab)", "8-15": "Nisfu Sya'ban (15 Sya'ban)",
      "9-1": "Awal Ramadhan (1 Ramadhan)", "9-17": "Nuzulul Qur'an (17 Ramadhan)",
      "10-1": "Hari Raya Idul Fitri (1 Syawal)", "12-9": "Puasa Arafah (9 Dzulhijjah)",
      "12-10": "Hari Raya Idul Adha (10 Dzulhijjah)"
    };
    
    document.getElementById('adjDisplay').innerText = hijriAdjustment > 0 ? `+${hijriAdjustment}` : hijriAdjustment;

    window.addEventListener('message', function(event) {
      if (event.data.type === 'SYNC_THEME') {
        if (event.data.isDark) document.body.classList.add("night");
        else document.body.classList.remove("night");
      }
      if (event.data.type === 'SYNC_COLOR') {
        document.documentElement.style.setProperty('--accent', event.data.colorHex);
      }
    });
    window.parent.postMessage({ type: 'REQUEST_SYNC' }, '*');

    function changeAdj(val) {
      hijriAdjustment += val;
      if(hijriAdjustment > 3) hijriAdjustment = 3;
      if(hijriAdjustment < -3) hijriAdjustment = -3;
      document.getElementById('adjDisplay').innerText = hijriAdjustment > 0 ? `+${hijriAdjustment}` : hijriAdjustment;
      localStorage.setItem('hijriAdj', hijriAdjustment);
      renderCalendar(); fetchTodayAPI(); 
    }

    async function fetchTodayAPI() {
      try {
        const res = await fetch(`https://api.myquran.com/v3/cal/today?adj=${hijriAdjustment}`);
        const json = await res.json();
        if(json.status) {
          const opt = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
          document.getElementById('todayCE').innerText = new Date().toLocaleDateString('id-ID', opt);
          document.getElementById('todayHijr').innerText = `${json.data.hijr.day} ${json.data.hijr.monthName} ${json.data.hijr.year} H`;
        }
      } catch(e) {
        document.getElementById('todayCE').innerText = "Gagal memuat API";
      }
    }

    function getArabicHijriDay(dateObj, adjDays) {
      const adjDate = new Date(dateObj.getTime() + (adjDays * 24 * 60 * 60 * 1000));
      return new Intl.DateTimeFormat('ar-SA-u-ca-islamic', { day: 'numeric' }).format(adjDate);
    }

    function getIslamicDateNumeric(dateObj, adjDays) {
      try {
        const adjDate = new Date(dateObj.getTime() + (adjDays * 24 * 60 * 60 * 1000));
        const parts = new Intl.DateTimeFormat('en-US-u-ca-islamic', { day: 'numeric', month: 'numeric' }).formatToParts(adjDate);
        let hDay = 1, hMonth = 1;
        parts.forEach(p => {
           if(p.type === 'day') hDay = parseInt(p.value, 10);
           if(p.type === 'month') hMonth = parseInt(p.value, 10);
        });
        return { hDay, hMonth };
      } catch(e) { return { hDay: 0, hMonth: 0 }; }
    }

    async function renderCalendar() {
      const picker = document.getElementById('monthPicker');
      if (picker.value) {
        const parts = picker.value.split('-');
        currentDate.setFullYear(parseInt(parts[0]), parseInt(parts[1]) - 1, 1);
      }
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();
      picker.value = `${year}-${String(month + 1).padStart(2, '0')}`;

      // Eksekusi API Guangrei dengan Caching Memori (Sangat Ringan)
      if (!apiHariLiburCache) {
        try {
          const res = await fetch("https://raw.githubusercontent.com/guangrei/APIHariLibur_V2/main/calendar.json");
          apiHariLiburCache = await res.json();
        } catch(e) {
          apiHariLiburCache = {};
        }
      }

      eventsList = [];
      const hList = document.getElementById('holidayList');
      const hPanel = document.getElementById('holidayPanel');
      hList.innerHTML = '<li class="holiday-item"><span class="h-name" style="padding-left:0;">Memuat data hari penting...</span></li>';
      hPanel.style.display = 'block';

      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const todayObj = new Date();
      const grid = document.getElementById('calendarGrid');
      grid.innerHTML = '';

      for (let i = 0; i < firstDay; i++) grid.innerHTML += `<div class="cell empty"></div>`;

      for (let i = 1; i <= daysInMonth; i++) {
        const loopDate = new Date(year, month, i);
        const hijriArabNumber = getArabicHijriDay(loopDate, hijriAdjustment);
        const { hDay, hMonth } = getIslamicDateNumeric(loopDate, hijriAdjustment);
        const dateString = `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
        
        let isHolidayEvent = false;
        
        // Cek Libur/Perayaan dari API Guangrei
        if (apiHariLiburCache && apiHariLiburCache[dateString]) {
           isHolidayEvent = true;
           const eventData = apiHariLiburCache[dateString];
           const eventName = eventData.summary || "Hari Libur / Perayaan";
           eventsList.push({ date: dateString, name: eventName, isHoliday: true, isIslamic: false });
        }
        
        // Kalkulasi Acara Islam secara Offline
        const eventKey = `${hMonth}-${hDay}`;
        if (islamicEvents[eventKey]) {
           const eventName = islamicEvents[eventKey];
           const exists = eventsList.find(e => e.date === dateString && e.name.includes(eventName.split(" ")[0]));
           if (!exists) eventsList.push({ date: dateString, name: eventName, isHoliday: false, isIslamic: true });
        }
        
        let isToday = false;
        if (loopDate.getDate() === todayObj.getDate() && loopDate.getMonth() === todayObj.getMonth() && loopDate.getFullYear() === todayObj.getFullYear()) {
          isToday = true;
        }
        
        let dayOfWeek = loopDate.getDay();
        let isSunday = (dayOfWeek === 0);
        let isFriday = (dayOfWeek === 5);
        
        // Logika Prioritas Warna Kalender
        let isRedDate = isHolidayEvent || isSunday;
        
        let classes = "cell";
        if (isToday) classes += " today";
        
        if (isRedDate) {
            classes += " holiday";
        } else if (isFriday) {
            classes += " friday";
        }

        grid.innerHTML += `
          <div class="${classes}">
            ${isHolidayEvent && !isToday ? '<div class="holiday-dot"></div>' : ''}
            <span class="gregorian">${i}</span>
            <span class="hijri">${hijriArabNumber}</span>
          </div>
        `;
      }
      
      // Render Event List
      hList.innerHTML = '';
      if (eventsList.length > 0) {
        hPanel.style.display = 'block';
        eventsList.sort((a, b) => new Date(a.date) - new Date(b.date));
        eventsList.forEach(ev => {
          const tglIndo = new Intl.DateTimeFormat('id-ID', {day:'numeric', month:'long', year:'numeric'}).format(new Date(ev.date));
          let icon = ev.isHoliday ? '<i class="bi bi-calendar-check-fill text-danger me-2" style="color: var(--danger);"></i>' : 
                     (ev.isIslamic ? '<i class="bi bi-moon-stars-fill me-2" style="color: var(--accent);"></i>' : '<i class="bi bi-calendar-event me-2" style="color: var(--text-muted);"></i>');
          let textColor = ev.isHoliday ? 'var(--danger)' : 'var(--text-main)';

          hList.innerHTML += `
            <li class="holiday-item">
              <span class="h-date" style="color: ${textColor};">${icon}${tglIndo}</span>
              <span class="h-name">${ev.name}</span>
            </li>
          `;
        });
      } else {
        hPanel.style.display = 'none';
      }
    }

    function changeMonth(step) {
      currentDate.setMonth(currentDate.getMonth() + step);
      const picker = document.getElementById('monthPicker');
      picker.value = `${currentDate.getFullYear()}-${String(currentDate.getMonth() + 1).padStart(2, '0')}`;
      renderCalendar();
    }

    fetchTodayAPI(); renderCalendar();
  </script>
</body>
</html>
