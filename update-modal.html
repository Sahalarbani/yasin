<div id="floatingModal" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); display: flex; align-items: center; justify-content: center; padding: 20px; opacity: 1; transition: opacity 0.3s ease;">
  
  <div style="background: var(--ios-bg-secondary); width: 100%; max-width: 360px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); display: flex; flex-direction: column; overflow: hidden; border: 0.5px solid var(--ios-glass-border);">
    
    <div style="padding: 24px 20px 10px 20px; text-align: center;">
      <h5 style="font-weight: 700; color: var(--ios-text-main); margin-bottom: 0; font-size: 1.15rem; letter-spacing: -0.5px;">Log Pembaruan</h5>
    </div>
    
    <div id="floatingContent" style="padding: 10px 24px 24px 24px; max-height: 60vh; overflow-y: auto; text-align: left;">
      <div style="text-align: center; color: var(--ios-text-muted); font-size: 0.9rem;">
        Menyinkronkan data dari server...
      </div>
    </div>

    <div style="border-top: 0.5px solid var(--ios-glass-border); display: flex;">
      <button onclick="closeFloatingModal()" style="flex: 1; background: transparent; border: none; padding: 16px; font-size: 1.05rem; font-weight: 600; color: var(--ios-blue); cursor: pointer; transition: background 0.2s;">
        Tutup
      </button>
    </div>

  </div>

</div>
